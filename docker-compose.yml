
services:
  postgres_db:
    image: postgres:16-alpine
    container_name: my_bot_postgres
    restart: always
    environment:
      POSTGRES_USER: alex_developer
      POSTGRES_PASSWORD: my_secret_password
      POSTGRES_DB: bot_data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
